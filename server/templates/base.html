<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LinkedIn Job Scraper{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
        [data-status="discovered"] { border-left: 4px solid #94a3b8; }
        [data-status="interested"] { border-left: 4px solid #3b82f6; }
        [data-status="applied"] { border-left: 4px solid #f59e0b; }
        [data-status="interviewing"] { border-left: 4px solid #8b5cf6; }
        [data-status="offer"] { border-left: 4px solid #22c55e; }
        [data-status="rejected"] { border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="h-full bg-gray-50 text-gray-900">
    <nav class="bg-white border-b shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/" class="text-lg font-bold text-blue-600">JobScraper</a>
                <a href="/" class="text-sm text-gray-600 hover:text-gray-900 {% if request.url.path == '/' %}font-semibold text-gray-900{% endif %}">Search</a>
                <a href="/jobs" class="text-sm text-gray-600 hover:text-gray-900 {% if request.url.path == '/jobs' %}font-semibold text-gray-900{% endif %}">Jobs</a>
                <a href="/pipeline" class="text-sm text-gray-600 hover:text-gray-900 {% if request.url.path == '/pipeline' %}font-semibold text-gray-900{% endif %}">Pipeline</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="/api/jobs/export" class="text-sm text-gray-500 hover:text-gray-700">Export CSV</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
